<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education - Registration Success</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f0f0f0;
  text-align:center;
}

/* Slider */
.slider {
  width:100%;
  height:400px;
  position:relative;
  overflow:hidden;
}
.slide {
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transition:opacity 1s;
}
.slide.active {
  opacity:1;
}

/* Logo */
.logo {
  margin:15px 0;
}

/* Success Box */
.box {
  background:#fff;
  max-width:500px;
  margin:20px auto;
  padding:30px;
  border-radius:10px;
  text-align:center;
  color:green;
  font-size:22px;
  font-weight:bold;
}

/* Notes Section */
ul {
  max-width:500px;
  margin:auto;
  text-align:left;
  padding-left:20px;
  line-height:1.8;
}

a {
  text-decoration:none;
  color:#2a9d8f;
}

/* Footer */
.footer {
  text-align:center;
  background:#264653;
  color:white;
  padding:15px;
  margin-top:40px;
}
</style>
</head>
<body>

<!-- Slider -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- Logo -->
<div class="logo">
  <img src="images.jpeg" alt="Ruhan Education Logo" width="200">
</div>

<!-- Success Message -->
<div class="box">
  ✅ Registration Successful!
</div>

<!-- Notes Section -->
<section>
  <h2>Download Notes</h2>
  <ul>
    <li><a href="notes/math.pdf" download>Math Notes</a></li>
    <li><a href="notes/english.pdf" download>English Notes</a></li>
    <li><a href="notes/physics.pdf" download>Physics Notes</a></li>
    <li><a href="notes/chemistry.pdf" download>Chemistry Notes</a></li>
    <li><a href="notes/biology.pdf" download>Biology Notes</a></li>
  </ul>
</section>

<!-- Footer -->
<div class="footer">
  © 2026 Ruhan Education | All Rights Reserved
</div>

<!-- JS Slider -->
<script>
let slides = document.querySelectorAll('.slide');
let index = 0;
function showSlide(){
  slides.forEach(s => s.classList.remove('active'));
  slides[index].classList.add('active');
  index++;
  if(index >= slides.length) index = 0;
}
setInterval(showSlide,3000);
</script>

</body>
</html>
