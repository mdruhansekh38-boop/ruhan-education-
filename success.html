<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education - Registration Success</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f0f0f0;
  text-align: center;
}

/* Slider */
.slider {
  width: 100%;
  height: 400px; /* index.html-এর মতো reasonable height */
  position: relative;
  overflow: hidden;
  margin: 0;
  padding: 0;
}

.slide {
  width: 100%;
  height: 100%;
  object-fit: cover; /* proportion ঠিক রাখবে */
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: opacity 1s;
}

.slide.active {
  opacity: 1;
}

/* Success Box */
.box {
  background: #fff;
  max-width: 500px;
  margin: 20px auto;
  padding: 30px;
  border-radius: 10px;
}

/* Sections */
section {
  margin: 40px 0;
}

/* Forms */
form {
  max-width: 400px;
  margin: 20px auto;
  text-align: left;
}
form input, form textarea {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  box-sizing: border-box;
}

button {
  background:#2a9d8f;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

a.button {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#2a9d8f;
  color:white;
  text-decoration:none;
  border-radius:5px;
}
</style>
</head>
<body>

<!-- Slider -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- Success Box -->
<div class="box">
  <h1 style="color:#2a9d8f;">Ruhan Education</h1>
  <hr>
  <h2 style="color:green;">✅ Registration Successful!</h2>
  <p>ধন্যবাদ! আপনার ফর্ম জমা হয়েছে।</p>
  <p style="color:#555;">আপনার রেজিস্ট্রেশন সম্পন্ন হয়েছে। আমাদের সাথে থাকুন এবং নতুন কোর্সগুলো দেখুন!</p>
  <a href="index.html" class="button">⬅ Back to Home</a>
</div>

<!-- Slider JS -->
<script>
let slides = document.querySelectorAll('.slide');
let currentIndex = 0;

function showSlide() {
  slides.forEach(slide => slide.classList.remove('active'));
  slides[currentIndex].classList.add('active');
  currentIndex++;
  if(currentIndex >= slides.length) currentIndex = 0;
}

setInterval(showSlide, 3000);
</script>

</body>
</html>
