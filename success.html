<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education - Registration Success</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f7fb;
  color:#333;
  text-align:center;
}

/* ===== SLIDER ===== */
.slider{
  width:100%;
  height:400px;
  position:relative;
  overflow:hidden;
}

.slide{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transition:opacity 1s;
}

.slide.active{
  opacity:1;
}

/* ===== LOGO ===== */
.logo{
  margin-top:20px;
}

.logo img{
  width:120px;
}

.logo h1{
  color:#0a3d62;
  margin:10px 0;
  font-size:32px;
}

/* ===== SUCCESS BOX ===== */
.success-box{
  background:white;
  max-width:600px;
  margin:20px auto;
  padding:20px;
  border-radius:10px;
  color:green;
  font-size:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ===== CARDS ===== */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin:30px 0;
}

.card{
  background:white;
  width:220px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* ===== BUTTON ===== */
button{
  background:#007bff;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
  font-size:15px;
}

button:hover{
  background:#0056b3;
}

/* ===== FOOTER ===== */
footer{
  margin-top:40px;
  padding:20px;
  background:#0a3d62;
  color:white;
  font-size:14px;
}

/* ===== LOGIN POPUP ===== */
#loginBox{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  z-index:100;
  width:300px;
  text-align:center;
}

#loginBox input{
  width:90%;
  padding:10px;
  margin:10px 0;
}

#loginBox button{
  width:95%;
  margin-top:5px;
}

#overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:50;
}

/* ===== MOBILE ===== */
@media(max-width:600px){
  .cards{
    flex-direction:column;
    align-items:center;
  }
  .card{
    width:90%;
  }
}
</style>
</head>
<body>

<!-- ===== SLIDER ===== -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- ===== LOGO ===== -->
<div class="logo">
  <img src="images.jpeg" alt="Logo">
  <h1>Ruhan Education</h1>
</div>

<!-- ===== SUCCESS MESSAGE ===== -->
<div class="success-box">
✅ Registration Successful!
</div>

<!-- ===== COURSES ===== -->
<h2>Our Courses</h2>
<div class="cards">
  <div class="card">
    <h3>Math Course</h3>
    <a href="math.html"><button>Enroll</button></a>
  </div>
  <div class="card">
    <h3>English Grammar</h3>
    <a href="english.html"><button>Enroll</button></a>
  </div>
</div>

<!-- ===== NOTES ===== -->
<h2>Study Notes</h2>
<div class="cards">
  <div class="card">
    <h3>Physics Notes</h3>
    <button onclick="openLogin('physics.pdf')">Download</button>
  </div>
  <div class="card">
    <h3>Chemistry Notes</h3>
    <button onclick="openLogin('chemistry.pdf')">Download</button>
  </div>
  <div class="card">
    <h3>Biology Notes</h3>
    <button onclick="openLogin('biology.pdf')">Download</button>
  </div>
  <div class="card">
    <h3>Bangla Notes</h3>
    <button onclick="openLogin('bangla.pdf')">Download</button>
  </div>
  <div class="card">
    <h3>English Notes</h3>
    <button onclick="openLogin('english.pdf')">Download</button>
  </div>
  <div class="card">
    <h3>Math Notes</h3>
    <button onclick="openLogin('math.pdf')">Download</button>
  </div>
</div>

<!-- ===== LOGIN POPUP ===== -->
<div id="overlay"></div>
<div id="loginBox">
<h3>Student Verification</h3>
<input type="text" id="dob" placeholder="Enter Date of Birth (YYYY-MM-DD)">
<input type="password" id="password" placeholder="Enter Password (ex: eduhub/0001)">
<button onclick="verifyAccess()">Submit</button>
<button onclick="closeLogin()">Cancel</button>
</div>

<footer>
© 2026 Ruhan Education | All Rights Reserved
</footer>

<script>
/* ===== SLIDER ===== */
let slides=document.querySelectorAll('.slide');
let index=0;
function showSlide(){
  slides.forEach(s=>s.classList.remove('active'));
  slides[index].classList.add('active');
  index++;
  if(index>=slides.length) index=0;
}
setInterval(showSlide,3000);

/* ===== LOGIN POPUP ===== */
let currentPDF = "";
function openLogin(pdf){
  currentPDF = pdf;
  document.getElementById('overlay').style.display='block';
  document.getElementById('loginBox').style.display='block';
}
function closeLogin(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('loginBox').style.display='none';
}
function verifyAccess(){
  let dob = document.getElementById('dob').value.trim();
  let pass = document.getElementById('password').value.trim();
  if(pass.startsWith('eduhub/') && dob!==""){
    // Open PDF in new tab
    window.open(currentPDF,'_blank');
    closeLogin();
  }else{
    alert("❌ Wrong password or DOB");
  }
}
</script>

</body>
  </html>
