<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success - Ruhan Education</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f7fb;
  text-align:center;
}

/* SLIDER */
.slider{
  width:100%;
  height:350px;
  overflow:hidden;
  position:relative;
}
.slide{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  opacity:0;
  transition:1s;
}
.active{opacity:1;}

/* SUCCESS TEXT */
.success{
  background:#d4edda;
  color:#155724;
  padding:20px;
  margin:20px auto;
  width:90%;
  max-width:600px;
  border-radius:10px;
}

/* NOTES SECTION */
.notes{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin:30px;
}

.box{
  background:white;
  padding:20px;
  width:200px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
  background:#007bff;
  color:white;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#0056b3;
}
</style>
</head>

<body>

<!-- SLIDER -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- SUCCESS MESSAGE -->
<div class="success">
  <h2>✅ Registration Successfully Completed</h2>
  <p>Welcome to Ruhan Education 🎉</p>
</div>

<!-- NOTES SECTION -->
<div class="notes">

  <div class="box">
    <h3>Math</h3>
    <button onclick="download()">Download</button>
  </div>

  <div class="box">
    <h3>Biology</h3>
    <button onclick="download()">Download</button>
  </div>

  <div class="box">
    <h3>Physics</h3>
    <button onclick="download()">Download</button>
  </div>

  <div class="box">
    <h3>Chemistry</h3>
    <button onclick="download()">Download</button>
  </div>

  <div class="box">
    <h3>Bangla</h3>
    <button onclick="download()">Download</button>
  </div>

  <div class="box">
    <h3>English</h3>
    <button onclick="download()">Download</button>
  </div>

  <!-- ✅ NEW SUBJECT ADDED -->
  <div class="box">
    <h3>Arabic All Details</h3>
    <button onclick="download()">Download</button>
  </div>

</div>

<!-- SCRIPT -->
<script>
/* SLIDER */
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
  i=(i+1)%slides.length;
},3000);

/* DOWNLOAD SYSTEM */
function download(){
  let dob=prompt("Enter Date of Birth:");
  let pass=prompt("Enter Password:");

  if(pass==="eduhub/0001"){
    alert("Opening PDF...");
    window.open("notes.pdf");
  }else{
    alert("❌ Wrong Password");
  }
}
</script>

</body>
  </html>
