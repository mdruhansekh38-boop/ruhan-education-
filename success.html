<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f7fb;
  text-align:center;
  color:#333;
}

/* ===== SLIDER ===== */
.slider{
  width:100%;
  height:400px;
  position:relative;
  overflow:hidden;
  background:#000;
}

.slide{
  width:100%;
  height:100%;
  object-fit:contain; /* full image visible */
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transition:opacity 1s;
}

.slide.active{
  opacity:1;
}

/* ===== LOGO ===== */
.logo img{
  width:120px;
  margin-top:20px;
}

.logo h1{
  color:#0a3d62;
  margin:10px 0;
  font-size:32px;
}

/* ===== SUCCESS BOX ===== */
.success-box{
  background:white;
  max-width:600px;
  margin:20px auto;
  padding:20px;
  border-radius:10px;
  color:green;
  font-size:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ===== CARDS ===== */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin:30px 0;
}

.card{
  background:white;
  width:220px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
  background:#007bff;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#0056b3;
}

/* ===== LOGIN BOX ===== */
.login-box{
  display:none;
  background:white;
  max-width:300px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.login-box input{
  width:90%;
  padding:10px;
  margin:8px 0;
}

/* ===== FOOTER ===== */
footer{
  margin-top:40px;
  padding:20px;
  background:#0a3d62;
  color:white;
  font-size:14px;
}
</style>
</head>
