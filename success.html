<!DOCTYPE html>
<html>
<head>
<title>Registration Success</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f0f0;
  margin: 0;
  padding: 20px;
}

/* Box for success message */
.box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  max-width: 500px;
  margin: 20px auto;
}

/* Slider CSS */
.slider {
  width: 100%;
  max-width: 600px;
  height: 300px;
  margin: 10px auto;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 100%;
  height: 100%
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.slide.active {
  opacity: 1;
}

/* Back to Home Button */
a.button {
  text-decoration: none;
  color: white;
  background: #2a9d8f;
  padding: 12px 25px;
  border-radius: 5px;
  display: inline-block;
  margin-top: 20px;
}
</style>
</head>
<body>

<!-- ================= Slider ================= -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- ================= Success Box ================= -->
<div class="box">
  <h1 style="color:#2a9d8f;">My Education Website</h1>
  <hr>
  <h2 style="color:green;">✅ Registration Successful!</h2>
  <p style="font-size:18px;">ধন্যবাদ! আপনার ফর্ম জমা হয়েছে।</p>
  <p style="font-size:16px; color:#555;">
    আপনার রেজিস্ট্রেশন সম্পন্ন হয়েছে। আমাদের সাথে থাকুন এবং নতুন কোর্সগুলো দেখুন!
  </p>
  <a href="index.html" class="button">⬅ Back to Home</a>
</div>

<!-- ================= Slider JS ================= -->
<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

function showSlide() {
  slides.forEach(slide => slide.classList.remove('active'));
  slides[index].classList.add('active');
  index++;
  if(index === slides.length) { index = 0; }
}

setInterval(showSlide, 3000);
</script>

</body>
</html>
