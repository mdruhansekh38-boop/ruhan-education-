<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduHub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            text-align: center;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
        }

        header h1 {
            margin: 5px 0;
        }

        .logo {
            margin-top: 20px;
        }

        .logo img {
            width: 140px;
        }

        .section {
            margin: 40px auto;
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        footer {
            margin-top: 40px;
            padding: 15px;
            background: #1e3a8a;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>EduHub</h1>
    <p>Excel With Us</p>
</header>

<!-- ✅ LOGO (images.jpeg ব্যবহার করা হয়েছে) -->
<div class="logo">
    <img src="images.jpeg" alt="EduHub Logo">
</div>

<div class="section">
    <h2>Student Registration</h2>
    <input type="text" placeholder="Your Name"><br>
    <input type="tel" placeholder="Phone Number"><br>
    <input type="email" placeholder="Email"><br>
    <button>Submit</button>
</div>

<div class="section">
    <h2>Contact Us</h2>
    <textarea rows="4" placeholder="Your Message"></textarea><br>
    <button>Send Message</button>
</div>

<footer>
    © 2026 EduHub | All Rights Reserved
</footer>

</body>
</html>
