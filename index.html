<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education System</title>
<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f4f7fb;
  text-align:center;
  color:#333;
}

/* ===== SLIDER ===== */
.slider {
  width:100%;
  height:400px;
  position:relative;
  overflow:hidden;
  background:#f4f7fb; /* black strip gone */
}

.slide {
  width:100%;
  height:100%;
  object-fit:cover; /* full slider, proportion maintained */
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transition:opacity 1s;
}

.slide.active {
  opacity:1;
}

/* ===== LOGO ===== */
.logo {
  margin-top:20px;
}

.logo img{
  width:120px;
}

.logo h1{
  color:#0a3d62;
  margin:10px 0;
  font-size:32px;
}

/* ===== FORM BOX ===== */
.form-box {
  background:#ffffff;
  max-width:420px;
  margin:30px auto;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.form-box h2{
  color:#007bff;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #dcdcdc;
  border-radius:6px;
  font-size:15px;
}

button {
  background:#007bff;
  color:white;
  padding:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  font-size:16px;
  transition:0.3s;
}

button:hover {
  background:#0056b3;
}

footer {
  margin-top:40px;
  padding:20px;
  background:#0a3d62;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<!-- ===== SLIDER ===== -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- ===== LOGO ===== -->
<div class="logo">
  <img src="images.jpeg" alt="Logo">
  <h1>Ruhan Education</h1>
</div>

<!-- ===== FORM ===== -->
<div class="form-box">
<h2>Student Registration</h2>
<form action="success.html" method="GET" onsubmit="return verifyOTP()">
<input type="text" placeholder="Student Name" required>
<input type="text" placeholder="Class" required>
<input type="tel" placeholder="Phone Number" required>
<input type="text" id="otp" placeholder="Enter OTP" required>
<button type="button" onclick="sendOTP()">Generate OTP</button>
<br><br>
<button type="submit">Submit</button>
</form>
</div>

<footer>
© 2026 Ruhan Education | All Rights Reserved
</footer>

<script>
/* ===== SLIDER ===== */
let slides=document.querySelectorAll('.slide');
let index=0;
function showSlide(){
  slides.forEach(s=>s.classList.remove('active'));
  slides[index].classList.add('active');
  index++;
  if(index>=slides.length) index=0;
}
setInterval(showSlide,3000);

/* ===== OTP SYSTEM ===== */
let generatedOTP="";
function sendOTP(){
  generatedOTP=Math.floor(1000+Math.random()*9000);
  alert("Your OTP is: "+generatedOTP);
}
function verifyOTP(){
  let entered=document.getElementById("otp").value;
  if(entered==generatedOTP){
    return true;
  }else{
    alert("❌ Wrong OTP");
    return false;
  }
}
</script>

</body>
</html>
