<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education - Registration</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f0f0f0;
}

/* Slider */
.slider {
  width: 100%;
  height: 300px;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.slide.active {
  opacity: 1;
}

/* Registration Form Box */
.box {
  background: #fff;
  max-width: 500px;
  margin: 20px auto;
  padding: 30px;
  border-radius: 10px;
  text-align: left;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  box-sizing: border-box;
}

button {
  background: #2a9d8f;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.error {
  color: red;
  display: none;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<!-- Slider -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- Registration Form with OTP -->
<div class="box">
  <h2 style="color:#2a9d8f; text-align:center;">Student Registration</h2>
  <div class="error" id="error-msg">ভুল OTP! আবার চেষ্টা করুন।</div>
  <form id="regForm">
    <label>Student Name:</label>
    <input type="text" id="name" required>

    <label>Class:</label>
    <input type="text" id="class" required>

    <label>Mobile Number:</label>
    <input type="tel" id="phone" required>

    <label>Enter OTP:</label>
    <input type="text" id="otp" required placeholder="1234">

    <button type="submit">Submit</button>
  </form>
</div>

<!-- Slider JS -->
<script>
let slides = document.querySelectorAll('.slide');
let index = 0;
function showSlide() {
  slides.forEach(s => s.classList.remove('active'));
  slides[index].classList.add('active');
  index++;
  if(index >= slides.length) index = 0;
}
setInterval(showSlide, 3000);
</script>

<!-- Form + OTP JS -->
<script>
const form = document.getElementById('regForm');
const errorMsg = document.getElementById('error-msg');
const correctOTP = "1234"; // তোমার OTP set

form.addEventListener('submit', function(e){
  e.preventDefault();
  const enteredOTP = document.getElementById('otp').value;
  if(enteredOTP === correctOTP){
    window.location.href = "success.html"; // OTP correct হলে success.html এ যাবে
  } else {
    errorMsg.style.display = 'block';
  }
});
</script>

</body>
  </html>
