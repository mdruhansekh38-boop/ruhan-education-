<!DOCTYPE html>
<html>
<head>
<title>My Education Website</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Top Slider */
.slider {
  width: 100%;
  height: 300px;
  overflow: hidden;
  position: relative;
}

.slide {
  width: 100%;
  height: 300px;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.slide.active {
  opacity: 1;
}

.content {
  padding: 20px;
  text-align: center;
}
</style>

</head>
<body>

<!-- ✅ Auto Changing Photo Slider -->
<div class="slider">
  
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>
  
  


<div class="content">
  <h1>Welcome to My Education Website</h1>
  <p>এখানে Student Registration, Course, Notes সব থাকবে।</p>
</div>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

function showSlide() {
  slides.forEach(slide => slide.classList.remove('active'));
  slides[index].classList.add('active');

  index++;
  if (index === slides.length) {
    index = 0;
  }
}

setInterval(showSlide, 3000);
</script>

</body>
</html>
<!-- Student Registration Form -->
<h2 style="text-align:center;">Student Registration</h2>

<form action="success.html" style="width:90%;max-width:400px;margin:auto;">

  <label>Class:</label><br>
  <input type="text" style="width:100%;padding:8px;"><br><br>

  <label>Mobile Number:</label><br>
  <input type="tel" style="width:100%;padding:8px;"><br><br>

  <button style="padding:10px 20px;background:green;color:white;border:none;">
    Submit
  </button>
</form>
