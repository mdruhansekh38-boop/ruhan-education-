<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

.slider{
width:100%;
height:350px;
position:relative;
overflow:hidden;
}

.slide{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.logo{
margin:20px;
}

.form-box{
background:white;
max-width:400px;
margin:20px auto;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#2a9d8f;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

</style></head><body><div class="slider">
<img src="IMG-20260211-WA0102.jpg" class="slide active">
<img src="IMG-20260211-WA0101.jpg" class="slide">
<img src="20260211_160932.jpg" class="slide">
</div><div class="logo">
<img src="images.jpeg" width="200">
</div><div class="form-box"><h2>Student Registration</h2><form action="success.html" onsubmit="return verifyOTP()"><input type="text" placeholder="Student Name" required>
<input type="text" placeholder="Class" required>
<input type="tel" placeholder="Phone Number" required><input type="text" id="otp" placeholder="Enter OTP" required><button type="button" onclick="sendOTP()">Generate OTP</button>
<br><br>
<button type="submit">Submit</button>

</form></div><script>

let slides=document.querySelectorAll(".slide");

let i=0;

function slider(){

slides.forEach(s=>s.classList.remove("active"));

slides[i].classList.add("active");

i++;

if(i>=slides.length){
i=0;
}

}

setInterval(slider,3000);

let generatedOTP="";

function sendOTP(){

generatedOTP=Math.floor(1000+Math.random()*9000);

alert("Your OTP is: "+generatedOTP);

}

function verifyOTP(){

let entered=document.getElementById("otp").value;

if(entered==generatedOTP){

return true;

}else{

alert("Wrong OTP");

return false;

}

}

</script></body>
  </html>
