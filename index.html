<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduHub</title><style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
.header{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* SLIDER */
.slider{
    width:100%;
    height:250px;
    overflow:hidden;
    position:relative;
}

.slide{
    width:100%;
    height:250px;
    object-fit:cover;
    position:absolute;
    top:0;
    left:0;
    opacity:0;
    transition:1s;
}

.slide.active{
    opacity:1;
}

/* LOGO */
.logo{
    text-align:center;
    margin-top:20px;
}

.logo img{
    width:120px;
}

/* FORM CARD */
.card{
    width:90%;
    max-width:400px;
    margin:25px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:15px;
    background:#1e3a8a;
    color:white;
    margin-top:30px;
}
</style></head><body><div class="header">EduHub</div><!-- IMAGE SLIDER --><div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div><!-- LOGO --><div class="logo">
  <img src="images.jpeg">
</div><!-- REGISTRATION FORM --><div class="card">
<h2>Student Registration</h2><input type="text" placeholder="Student Name" required>
<input type="text" placeholder="Class" required>
<input type="tel" placeholder="Phone Number" required><input type="text" id="otpBox" placeholder="Enter OTP"><button onclick="generateOTP()">Generate OTP</button>

</div><!-- CONTENT --><div class="card">
<h2>Welcome</h2>
<p style="text-align:center;">
এখানে তোমার বাকি সব content থাকবে।<br>
Courses • Notice • Update • Information
</p>
</div><div class="footer">
© 2026 EduHub | All Rights Reserved
</div><script>
/* AUTO IMAGE SLIDER */
let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);

/* RANDOM OTP */
function generateOTP(){
let otp=Math.floor(1000+Math.random()*9000);
alert("Your OTP is: "+otp);
}
</script></body>
                                                                                                                 </html>
