<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduHub</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6fb;
}

/* HEADER */
header{
    background:#2f4a8a;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* SLIDER */
.slider{
    width:100%;
    height:220px;
    overflow:hidden;
    position:relative;
}
.slide{
    width:100%;
    height:220px;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:1s;
}
.slide.active{
    opacity:1;
}

/* LOGO */
.logo{
    text-align:center;
    margin-top:20px;
}
.logo img{
    width:120px;
}

/* CARD */
.card{
    background:white;
    width:90%;
    max-width:400px;
    margin:25px auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.card h2{
    text-align:center;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2d63c8;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}

/* FOOTER */
footer{
    background:#2f4a8a;
    color:white;
    text-align:center;
    padding:12px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>EduHub</header>

<!-- IMAGE SLIDER -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- LOGO -->
<div class="logo">
<img src="images.jpeg">
</div>

<!-- REGISTRATION FORM -->
<div class="card">
<h2>Student Registration</h2>

<input type="text" placeholder="Student Name" id="name">
<input type="text" placeholder="Class" id="class">
<input type="text" placeholder="Phone Number" id="phone">

<input type="text" placeholder="Enter OTP" id="otp">

<button type="button" onclick="generateOTP()">Generate OTP</button>
<button type="button" onclick="verifyOTP()">Submit</button>

</div>

<!-- CONTENT -->
<div class="card">
<h3>Welcome</h3>
<p>এখানে তোমার বাকি সব content থাকবে।</p>
<p>Courses · Notice · Update · Information</p>
</div>

<footer>© 2026 EduHub | All Rights Reserved</footer>

<script>
/* SLIDER AUTO CHANGE */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
slides[index].classList.remove("active");
index = (index+1)%slides.length;
slides[index].classList.add("active");
},3000);

/* OTP SYSTEM */
let generatedOTP="";

function generateOTP(){
generatedOTP = Math.floor(1000 + Math.random()*9000);
alert("Your OTP is: " + generatedOTP);
}

function verifyOTP(){
let userOTP=document.getElementById("otp").value;

if(userOTP==generatedOTP && userOTP!=""){
alert("Registration Successful ✅");
}
else{
alert("Wrong OTP ❌");
}
}
</script>

</body>
    </html>
