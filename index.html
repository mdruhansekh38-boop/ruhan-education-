<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduHub</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    text-align:center;
}

/* ===== SLIDER ===== */
.slider{
    width:100%;
    height:300px;
    position:relative;
    overflow:hidden;
}

.slide{
    width:100%;
    height:300px;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:opacity 1s ease-in-out;
}

.slide.active{
    opacity:1;
}

/* ===== LOGO ===== */
.logo{
    margin-top:20px;
}

.logo img{
    width:140px;
}

/* ===== CONTENT BOX ===== */
.container{
    max-width:500px;
    background:white;
    margin:30px auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

/* ===== FOOTER ===== */
.footer{
    margin-top:40px;
    padding:15px;
    background:#222;
    color:white;
    font-size:14px;
}
</style>
</head>

<body>

<!-- ===== TOP AUTO IMAGE SLIDER ===== -->
<div class="slider">
    <img src="IMG-20260211-WA0102.jpg" class="slide active">
    <img src="IMG-20260211-WA0101.jpg" class="slide">
    <img src="20260211_160932.jpg" class="slide">
</div>

<!-- ===== LOGO BELOW SLIDER ===== -->
<div class="logo">
    <img src="images.jpeg">
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="container">
    <h2>Student Registration</h2>

    <input type="text" placeholder="Full Name">
    <input type="tel" placeholder="Phone Number">
    <input type="text" placeholder="Course Name">

    <button>Submit</button>
</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
    © 2026 EduHub | All Rights Reserved
</div>

<script>
/* ===== AUTO SLIDER SCRIPT ===== */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
},3000);
</script>

</body>
    </html>
