<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
}

/* ===== SLIDER ===== */
.slider{
    width:100%;
    height:220px;
    overflow:hidden;
    position:relative;
}

.slide{
    width:100%;
    height:220px;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:1s;
}

.slide.active{
    opacity:1;
}

/* ===== LOGO ===== */
.logo{
    margin:15px 0;
}

.logo img{
    width:120px;
}

/* ===== FORM ===== */
.form-box{
    background:white;
    width:90%;
    max-width:400px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

/* ===== CONTENT ===== */
.content{
    padding:20px;
}
</style>
</head>

<body>

<!-- ====== AUTO IMAGE SLIDER ====== -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- ====== LOGO ====== -->
<div class="logo">
    <img src="logo.png" alt="Logo">
</div>

<!-- ====== FORM ====== -->
<div class="form-box">
    <h2>Student Registration</h2>

    <input type="text" placeholder="Student Name"><br>
    <input type="text" placeholder="Class"><br>
    <input type="number" placeholder="Phone Number"><br>

    <p id="otpText"></p>
    <input type="text" placeholder="Enter OTP"><br>

    <button onclick="generateOTP()">Generate OTP</button>
</div>

<!-- ====== BELOW CONTENT ====== -->
<div class="content">
    <h3>Welcome</h3>
    <p>এখানে তোমার বাকি সব content থাকবে।</p>
</div>

<script>
/* ===== AUTO SLIDER ===== */
let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{
    slides[index].classList.remove("active");
    index=(index+1)%slides.length;
    slides[index].classList.add("active");
},3000);

/* ===== RANDOM OTP ===== */
function generateOTP(){
    let otp=Math.floor(1000+Math.random()*9000);
    document.getElementById("otpText").innerText="Your OTP: "+otp;
}
</script>

</body>
        </html>
