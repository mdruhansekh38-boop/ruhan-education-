<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f0f0f0;
  text-align:center;
}

/* Slider */
.slider {
  width:100%;
  height:400px;
  position:relative;
  overflow:hidden;
}

.slide {
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transition:opacity 1s;
}

.slide.active {
  opacity:1;
}

/* Logo */
.logo {
  margin:15px 0;
}

/* Form Box */
.form-box {
  background:#fff;
  max-width:400px;
  margin:20px auto;
  padding:25px;
  border-radius:10px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
}

button {
  background:#2a9d8f;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  width:100%;
}
</style>
</head>

<body>

<!-- ================= Slider ================= -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- ================= Logo ================= -->
<div class="logo">
  <h1 style="color:#2a9d8f;">Ruhan Education</h1>
</div>

<!-- ================= Registration Form ================= -->
<div class="form-box">
  <h2>Student Registration</h2>

  <!-- 🔥 IMPORTANT CHANGE HERE -->
  <form action="success.html" method="GET" onsubmit="return verifyOTP()">

    <input type="text" placeholder="Student Name" required>
    <input type="text" placeholder="Class" required>
    <input type="tel" placeholder="Phone Number" required>

    <input type="text" id="otp" placeholder="Enter OTP" required>

    <button type="button" onclick="sendOTP()">Generate OTP</button>
    <br><br>
    <button type="submit">Submit</button>

  </form>
</div>

<!-- ================= JS ================= -->
<script>
/* Slider */
let slides = document.querySelectorAll('.slide');
let index = 0;

function showSlide(){
  slides.forEach(s => s.classList.remove('active'));
  slides[index].classList.add('active');
  index++;
  if(index >= slides.length) index = 0;
}
setInterval(showSlide,3000);


/* OTP System */
let generatedOTP = "";

function sendOTP(){
  generatedOTP = Math.floor(1000 + Math.random() * 9000);
  alert("Your OTP is: " + generatedOTP);
}

function verifyOTP(){
  let entered = document.getElementById("otp").value;

  if(entered == generatedOTP){
    return true;   // যাবে success.html এ
  }else{
    alert("❌ Wrong OTP");
    return false;  // যাবে না
  }
}
</script>

</body>
</html>
