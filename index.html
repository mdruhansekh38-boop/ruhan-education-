<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education - Registration</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #f0f0f0;
  text-align: center;
}

/* Slider */
.slider {
  width: 100%;
  height: 300px;
  position: relative;
  overflow: hidden;
  margin: 0;
}

.slide {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: opacity 1s;
}

.slide.active {
  opacity: 1;
}

/* Form Box */
.box {
  background: #fff;
  max-width: 500px;
  margin: 20px auto;
  padding: 30px;
  border-radius: 10px;
  text-align: left;
}

form input, form textarea, form select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  box-sizing: border-box;
}

button {
  background:#2a9d8f;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

a.button {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#2a9d8f;
  color:white;
  text-decoration:none;
  border-radius:5px;
}
</style>
</head>
<body>

<!-- Slider -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- Registration Form -->
<div class="box">
  <h1 style="color:#2a9d8f; text-align:center;">Ruhan Education</h1>
  <hr>
  <form id="registration-form" action="https://formspree.io/f/mnqwrjlb" method="POST">
    <label>Student Name:</label>
    <input type="text" name="name" required>
    
    <label>Class:</label>
    <input type="text" name="class" required>
    
    <label>Phone Number:</label>
    <input type="tel" name="phone" id="phone" required>
    
    <div id="otp-section" style="display:none;">
      <label>Enter OTP:</label>
      <input type="text" id="otp-input" placeholder="Enter OTP" required>
      <button type="button" id="verify-otp">Verify OTP</button>
    </div>
    
    <button type="button" id="send-otp">Send OTP</button>
  </form>
</div>

<script>
// Slider JS
let slides = document.querySelectorAll('.slide');
let currentIndex = 0;
function showSlide() {
  slides.forEach(slide => slide.classList.remove('active'));
  slides[currentIndex].classList.add('active');
  currentIndex++;
  if(currentIndex >= slides.length) currentIndex = 0;
}
setInterval(showSlide, 3000);

// OTP JS
let currentOTP = '';
document.getElementById('send-otp').addEventListener('click', function() {
  const phone = document.getElementById('phone').value.trim();
  if(phone === '') {
    alert('Please enter phone number.');
    return;
  }
  // Generate random 4-digit OTP
  currentOTP = Math.floor(1000 + Math.random() * 9000).toString();
  alert('OTP Sent to your phone! (Simulated): ' + currentOTP);
  document.getElementById('otp-section').style.display = 'block';
});

document.getElementById('verify-otp').addEventListener('click', function() {
  const otpInput = document.getElementById('otp-input').value.trim();
  if(otpInput === currentOTP) {
    document.getElementById('registration-form').submit();
    alert('OTP Verified! Form Submitted.');
  } else {
    alert('Incorrect OTP. Try again.');
  }
});
</script>

</body>
        </html>
