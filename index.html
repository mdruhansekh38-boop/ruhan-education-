<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ruhan Education - Registration</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f0f0f0;
}

/* Slider */
.slider {
  width: 100%;
  height: 300px;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.slide.active {
  opacity: 1;
}

/* Form Box */
.form-box {
  background: white;
  max-width: 400px;
  margin: 20px auto;
  padding: 30px;
  border-radius: 10px;
  text-align: left;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  box-sizing: border-box;
}

button {
  background: #2a9d8f;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  width: 100%;
  font-size: 16px;
  margin-top: 10px;
}

.error {
  color: red;
  font-size: 14px;
  margin-bottom: 10px;
}

/* OTP Section hidden initially */
#otp-section {
  display: none;
}
</style>
</head>
<body>

<!-- ================= Slider ================= -->
<div class="slider">
  <img src="IMG-20260211-WA0102.jpg" class="slide active">
  <img src="IMG-20260211-WA0101.jpg" class="slide">
  <img src="20260211_160932.jpg" class="slide">
</div>

<!-- ================= Slider JS ================= -->
<script>
let slides = document.querySelectorAll('.slide');
let currentIndex = 0;
function showSlide() {
  slides.forEach(slide => slide.classList.remove('active'));
  slides[currentIndex].classList.add('active');
  currentIndex++;
  if(currentIndex >= slides.length) currentIndex = 0;
}
setInterval(showSlide, 3000);
</script>

<!-- ================= Registration Form ================= -->
<div class="form-box">
  <h2 style="text-align:center;">Student Registration</h2>
  
  <div id="error" class="error"></div>
  
  <label>Student Name:</label>
  <input type="text" id="name" placeholder="Enter your name" required>
  
  <label>Class:</label>
  <input type="text" id="class" placeholder="Enter your class" required>
  
  <label>Phone Number:</label>
  <input type="tel" id="phone" placeholder="Enter your phone number" required>
  
  <button id="send-otp">Send OTP</button>
  
  <!-- OTP Input -->
  <div id="otp-section">
    <label>Enter OTP:</label>
    <input type="text" id="otp-input" placeholder="Enter OTP">
    <button id="verify-otp">Verify OTP</button>
  </div>
</div>

<script>
// OTP logic (simulated)
let generatedOTP = null;

document.getElementById('send-otp').addEventListener('click', function() {
  let phone = document.getElementById('phone').value.trim();
  if(phone === '') {
    document.getElementById('error').textContent = 'Please enter phone number.';
    return;
  }
  // Generate 4-digit OTP
  generatedOTP = Math.floor(1000 + Math.random() * 9000);
  console.log('Generated OTP:', generatedOTP); // For testing in console
  alert('OTP Sent! (Simulated: ' + generatedOTP + ')'); // Simulate SMS
  document.getElementById('otp-section').style.display = 'block';
  document.getElementById('error').textContent = '';
});

document.getElementById('verify-otp').addEventListener('click', function() {
  let enteredOTP = document.getElementById('otp-input').value.trim();
  if(enteredOTP === '') {
    document.getElementById('error').textContent = 'Please enter OTP.';
    return;
  }
  if(enteredOTP == generatedOTP) {
    // Success
    window.location.href = 'success.html';
  } else {
    document.getElementById('error').textContent = 'Invalid OTP. Try again.';
  }
});
</script>

</body>
      </html>
