<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduHub</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
text-align:center;
}

.container{
width:90%;
max-width:400px;
margin:auto;
background:white;
padding:25px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.logo{
width:120px;
margin-bottom:10px;
}

h2{
margin:10px 0;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#otpSection,#mainContent{
display:none;
}

.course-box{
background:#eef3ff;
margin:10px;
padding:10px;
border-radius:6px;
}

footer{
margin-top:30px;
padding:10px;
background:#222;
color:white;
font-size:14px;
}
</style>
</head>

<body>

<div class="container" id="formSection">
<img src="logo.png" class="logo">
<h2>Student Registration</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="class" placeholder="Class">
<input type="tel" id="phone" placeholder="Phone Number">

<button onclick="sendOTP()">Send OTP</button>
<p id="msg"></p>
</div>


<div class="container" id="otpSection">
<h2>OTP Verification</h2>
<input type="text" id="otpInput" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify</button>
<p id="otpMsg"></p>
</div>


<div id="mainContent">
<div class="container">
<h2>Courses</h2>
<div class="course-box">Mathematics</div>
<div class="course-box">Science</div>
<div class="course-box">English</div>
</div>

<div class="container">
<h2>Downloadable Notes</h2>
<div class="course-box">Class 10 Notes PDF</div>
<div class="course-box">Class 9 Notes PDF</div>
</div>

<div class="container">
<h2>Contact</h2>
<p>Phone: 9876543210</p>
<p>Email: eduhub@email.com</p>
</div>
</div>

<footer>
© 2026 EduHub | All Rights Reserved
</footer>


<script>
let generatedOTP="";

function sendOTP(){

let name=document.getElementById("name").value;
let studentClass=document.getElementById("class").value;
let phone=document.getElementById("phone").value;

if(name=="" || studentClass=="" || phone==""){
document.getElementById("msg").innerText="Fill all fields!";
return;
}

generatedOTP=Math.floor(1000+Math.random()*9000);

alert("Demo OTP: "+generatedOTP); // OTP user কে দেখাবে

document.getElementById("formSection").style.display="none";
document.getElementById("otpSection").style.display="block";
}

function verifyOTP(){

let entered=document.getElementById("otpInput").value;

if(entered==generatedOTP){
document.getElementById("otpSection").style.display="none";
document.getElementById("mainContent").style.display="block";
}
else{
document.getElementById("otpMsg").innerText="Wrong OTP!";
}
}
</script>

</body>
  </html>
